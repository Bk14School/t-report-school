<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบรายงานผลการปฏิบัติงาน</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--e1:#0c3b2e;--e2:#145a3e;--e3:#1a7a54;--e4:#22a06b;--e5:#57d9a3;--e6:#b3f5d4;--e7:#e3fcef;--e8:#f4fdf8;--g1:#6b4f17;--g2:#a67c2e;--g3:#d4a843;--g4:#f0c75e;--n1:#1a1d23;--n3:#464c57;--n4:#6b7280;--n5:#9ca3af;--n7:#e8ecf0;--n8:#f3f5f8;--n9:#fafbfc;--bg:#f7f9f8;--card:#fff;--shadow-sm:0 2px 8px rgba(12,59,46,.06);--shadow-md:0 8px 24px rgba(12,59,46,.08);--r:20px;--rs:12px;--ease:.3s cubic-bezier(.4,0,.2,1);--bounce:.5s cubic-bezier(.34,1.56,.64,1)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--n1);line-height:1.8;font-size:15px;-webkit-font-smoothing:antialiased}::selection{background:var(--e6);color:var(--e1)}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}@keyframes spin{to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,160,107,.4)}70%{box-shadow:0 0 0 10px rgba(34,160,107,0)}}
.hero{background:var(--e1);position:relative;overflow:hidden;min-height:220px}.hero-bg{position:absolute;inset:0;overflow:hidden}.hero-bg .orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:.15}.orb-1{width:400px;height:400px;background:var(--e4);top:-100px;right:-50px;animation:float 8s ease infinite}.orb-2{width:300px;height:300px;background:var(--g3);bottom:-80px;left:-40px;animation:float 10s ease infinite 2s}.hero-pattern{position:absolute;inset:0;opacity:.04;background-image:repeating-linear-gradient(45deg,transparent,transparent 35px,rgba(255,255,255,.5) 35px,rgba(255,255,255,.5) 36px)}
.hi{max-width:960px;margin:0 auto;padding:48px 32px 40px;position:relative;z-index:1;color:#fff}.hero-top{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}.hero-icon{width:56px;height:56px;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.12);border-radius:18px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);animation:float 6s ease infinite}.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);padding:7px 16px;border-radius:24px;font-size:12px;backdrop-filter:blur(8px)}.hero-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--e5);box-shadow:0 0 8px var(--e5)}
.hero h1{font-family:'Prompt',sans-serif;font-size:clamp(22px,5vw,34px);font-weight:700;line-height:1.2;margin-bottom:6px;letter-spacing:-.5px;background:linear-gradient(135deg,#fff,var(--e6),var(--g4));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.hero p{font-size:14px;opacity:.6;font-weight:300}
.mn{max-width:960px;margin:0 auto;padding:28px 32px 80px}
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:24px}.search-box{flex:1;min-width:200px;position:relative}.search-box input{width:100%;padding:11px 16px 11px 42px;border:2px solid var(--n7);border-radius:var(--rs);font-family:inherit;font-size:14px;outline:none;transition:var(--ease);background:var(--card)}.search-box input:focus{border-color:var(--e4);box-shadow:0 0 0 4px rgba(34,160,107,.1)}.search-box::before{content:'🔍';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:24px}.stat-card{background:var(--card);border-radius:var(--rs);padding:16px;border:1px solid var(--n7);text-align:center}.stat-num{font-family:'Prompt',sans-serif;font-size:26px;font-weight:700;color:var(--e1)}.stat-label{font-size:11px;color:var(--n4);margin-top:2px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:18px}
.tcard{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-sm);border:1px solid var(--n7);overflow:hidden;transition:var(--ease);cursor:pointer}.tcard:hover{box-shadow:var(--shadow-md);transform:translateY(-4px);border-color:var(--e5)}.tcard-top{padding:22px 22px 14px;display:flex;align-items:flex-start;gap:14px}.tcard-avatar{width:50px;height:50px;border-radius:14px;background:linear-gradient(135deg,var(--e1),var(--e3));display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Prompt',sans-serif;font-size:18px;font-weight:600;flex-shrink:0;box-shadow:0 4px 14px rgba(12,59,46,.2)}.tcard-info{flex:1;min-width:0}.tcard-info h3{font-family:'Prompt',sans-serif;font-size:15px;font-weight:600;color:var(--e1);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tcard-info .tid{font-size:11px;color:var(--n5);font-family:'Prompt',sans-serif}.tcard-bottom{padding:11px 22px;background:var(--n9);border-top:1px solid var(--n7);display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--n4)}.tcard-link{color:var(--e3);font-weight:500;font-size:12px;display:flex;align-items:center;gap:4px}
.empty{text-align:center;padding:60px 20px;color:var(--n4)}.empty-icon{font-size:48px;margin-bottom:14px}.empty h3{font-family:'Prompt',sans-serif;font-size:17px;color:var(--n3);margin-bottom:6px}
.loading{text-align:center;padding:80px 20px}.loading .spinner{width:40px;height:40px;border:3px solid var(--n7);border-top-color:var(--e4);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}.loading p{color:var(--n4);font-family:'Prompt',sans-serif;font-size:14px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(30px);padding:12px 24px;border-radius:60px;font-family:'Prompt',sans-serif;font-size:13px;z-index:3000;opacity:0;transition:var(--bounce);pointer-events:none;background:var(--e1);color:#fff;box-shadow:0 16px 48px rgba(12,59,46,.1)}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.back-btn{position:fixed;top:14px;left:14px;z-index:1000;padding:9px 18px;border-radius:var(--rs);border:none;background:rgba(255,255,255,.1);backdrop-filter:blur(8px);color:#fff;font-family:'Prompt',sans-serif;font-size:12px;cursor:pointer;transition:var(--ease);display:flex;align-items:center;gap:5px;text-decoration:none}.back-btn:hover{background:rgba(255,255,255,.2);transform:translateX(-3px)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel{border-radius:8px;background:linear-gradient(90deg,#e8ecf0 25%,#f3f5f8 50%,#e8ecf0 75%);background-size:200%;animation:shimmer 1.5s infinite}
@media(max-width:768px){.hi{padding:36px 20px 32px}.mn{padding:20px 16px 60px}.grid{grid-template-columns:1fr}.toolbar{flex-direction:column}.search-box{min-width:100%}.stats{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.hi{padding:28px 14px 24px}.mn{padding:14px 10px 50px}.hero h1{font-size:20px}.tcard-top{padding:14px}.tcard-avatar{width:40px;height:40px;font-size:15px;border-radius:11px}.back-btn{top:8px;left:8px;padding:7px 12px;font-size:11px}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<a class="back-btn" href="index.html">← หน้าหลัก</a>

<header class="hero">
<div class="hero-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="hero-pattern"></div></div>
<div class="hi">
<div class="hero-top">
<div class="hero-icon"><img src="https://raw.githubusercontent.com/Bk14School/easygrade/refs/heads/main/logo-OBEC.png" alt="OBEC" style="width:40px;height:40px;object-fit:contain"></div>
<div class="hero-badge"><div class="dot"></div>ระบบรายงานออนไลน์</div>
</div>
<h1 id="schoolName">รายงานผลการปฏิบัติงาน</h1>
<p id="schoolSub">📋 เลือกครูเพื่อดูรายงาน</p>
</div>
</header>

<div class="mn">
<div class="stats" id="statsArea"></div>
<div class="toolbar">
<div class="search-box"><input type="text" id="searchInput" placeholder="ค้นหาชื่อครู..." oninput="filterTeachers()"></div>
</div>
<div id="teacherGrid" class="grid"></div>
<div id="loadingArea"></div>
</div>

<script>
const API='https://script.google.com/macros/s/AKfycbzWU3DzJHBsMXXAtYU4E2wY_23iPXd2EdVBEZ6KTn2hjZYATQYXQywJDuKXeiIUcO_kjQ/exec';
const REPORT_TYPE=(new URLSearchParams(window.location.search).get('type')||'').trim();
if(!REPORT_TYPE){document.body.innerHTML='<div style="text-align:center;padding:100px 20px"><h2 style="font-family:Prompt,sans-serif;color:#e74c3c">ไม่พบประเภทรายงาน</h2><p style="color:#6b7280;margin:16px 0">กรุณาระบุ ?type=t-report</p><a href="index.html" style="color:#22a06b;font-family:Prompt,sans-serif">← กลับหน้าหลัก</a></div>';throw new Error('No report_type');}

let teachers=[];

// ═══════════ CACHE LAYER ═══════════
const CACHE_TTL=5*60*1000;
function cacheGet(k){try{const r=sessionStorage.getItem('c_'+k);if(!r)return null;const{d,t}=JSON.parse(r);if(Date.now()-t>CACHE_TTL){sessionStorage.removeItem('c_'+k);return null}return d}catch{return null}}
function cacheSet(k,d){try{sessionStorage.setItem('c_'+k,JSON.stringify({d,t:Date.now()}))}catch{}}

// ═══════════ SKELETON LOADING ═══════════
function showSkeleton(){
  document.getElementById('teacherGrid').innerHTML=Array(6).fill('').map(()=>'<div class="tcard" style="pointer-events:none"><div class="tcard-top"><div class="skel" style="width:50px;height:50px;border-radius:14px;flex-shrink:0"></div><div style="flex:1"><div class="skel" style="height:16px;width:65%;margin-bottom:8px"></div><div class="skel" style="height:12px;width:40%"></div></div></div><div class="tcard-bottom"><div class="skel" style="height:12px;width:30%"></div><div class="skel" style="height:12px;width:60px"></div></div></div>').join('');
  document.getElementById('loadingArea').innerHTML='';
}

document.addEventListener('DOMContentLoaded',load);

async function load(){
  const ck='teachers_'+REPORT_TYPE;
  const cached=cacheGet(ck);
  if(cached&&cached.teachers){
    teachers=cached.teachers||[];
    applyHeader(cached);
    renderTeachers();
    // fetch ใหม่เบื้องหลัง
    fetchTeachersFresh(ck);
    return;
  }
  showSkeleton();
  await fetchTeachersFresh(ck);
}

function applyHeader(j){
  const hs=j.hub_setting||j.hub_settings||{};
  document.getElementById('schoolName').textContent=j.report_type?.title||REPORT_TYPE;
  if(hs.school_name)document.getElementById('schoolSub').textContent=hs.school_name;
  document.title=(j.report_type?.title||REPORT_TYPE)+' — '+(hs.school_name||'');
  document.getElementById('statsArea').innerHTML='<div class="stat-card"><div class="stat-num">'+teachers.length+'</div><div class="stat-label">จำนวนครู</div></div>';
}

async function fetchTeachersFresh(ck){
  try{
    const r=await fetch(API+'?action=list_teachers&report_type='+encodeURIComponent(REPORT_TYPE),{redirect:'follow'});
    const j=await r.json();
    if(j.status==='ok'){
      cacheSet(ck,j);
      teachers=j.teachers||[];
      applyHeader(j);
      renderTeachers();
    }else showErr(j.message||'โหลดไม่สำเร็จ');
  }catch(e){showErr(e.message)}
}

function showErr(m){document.getElementById('loadingArea').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><h3>โหลดไม่สำเร็จ</h3><p>'+esc(m)+'</p><button onclick="load()" style="margin-top:14px;padding:10px 24px;border:none;border-radius:10px;background:linear-gradient(135deg,#0c3b2e,#1a7a54);color:#fff;font-family:Prompt,sans-serif;font-size:13px;cursor:pointer">ลองใหม่</button></div>';}

function renderTeachers(list){
  document.getElementById('loadingArea').innerHTML='';
  list=list||teachers;
  if(!list.length){document.getElementById('teacherGrid').innerHTML='<div class="empty" style="grid-column:1/-1"><div class="empty-icon">👤</div><h3>ยังไม่มีครูที่เผยแพร่</h3></div>';return;}
  document.getElementById('teacherGrid').innerHTML=list.map(t=>{
    const ini=esc((t.name||t.id||'').substring(0,2));
    const d=t.created?new Date(t.created).toLocaleDateString('th-TH',{year:'numeric',month:'short',day:'numeric'}):'';
    return '<div class="tcard" onclick="location.href=\'report.html?type='+encodeURIComponent(REPORT_TYPE)+'&id='+encodeURIComponent(t.id)+'\'"><div class="tcard-top"><div class="tcard-avatar">'+ini+'</div><div class="tcard-info"><h3>'+esc(t.name||t.id)+'</h3><div class="tid">📁 '+esc(t.id)+'</div></div></div><div class="tcard-bottom"><span>'+(d?'📅 '+d:'')+'</span><span class="tcard-link">ดูรายงาน →</span></div></div>';
  }).join('');
}

function filterTeachers(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  renderTeachers(q?teachers.filter(t=>(t.name||'').toLowerCase().includes(q)||(t.id||'').toLowerCase().includes(q)):teachers);
}

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
</script>
</body>
</html>
