<style>
:root{--e1:#0c3b2e;--e2:#145a3e;--e3:#1a7a54;--e4:#22a06b;--e5:#57d9a3;--e6:#b3f5d4;--e7:#e3fcef;--e8:#f4fdf8;--g1:#6b4f17;--g2:#a67c2e;--g3:#d4a843;--g4:#f0c75e;--g5:#f9e39f;--g6:#fef3cd;--n1:#1a1d23;--n2:#2d3139;--n3:#464c57;--n4:#6b7280;--n5:#9ca3af;--n6:#d1d5db;--n7:#e8ecf0;--n8:#f3f5f8;--n9:#fafbfc;--bg:#f7f9f8;--card:#fff;--red:#e74c3c;--shadow-xs:0 1px 2px rgba(12,59,46,.04);--shadow-sm:0 2px 8px rgba(12,59,46,.06);--shadow-md:0 8px 24px rgba(12,59,46,.08);--shadow-lg:0 16px 48px rgba(12,59,46,.1);--shadow-glow:0 0 40px rgba(34,160,107,.15);--r:20px;--rs:12px;--rx:8px;--ease:.3s cubic-bezier(.4,0,.2,1);--bounce:.5s cubic-bezier(.34,1.56,.64,1)}

.mn{max-width:900px;margin:32px auto;padding:0 32px 120px}.tp{display:none}.tp.active{display:block;animation:fadeUp .4s ease}

.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}.ic{padding:16px 18px;background:var(--n9);border-radius:var(--rs);border:1px solid var(--n7);transition:var(--ease);position:relative;overflow:hidden}.ic::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,var(--e4),var(--e2));border-radius:0 2px 2px 0;opacity:0;transition:var(--ease)}.ic:hover{border-color:var(--e5);box-shadow:var(--shadow-xs)}.ic:hover::before{opacity:1}.ic .fl{font-family:'Prompt',sans-serif;font-size:10px;font-weight:500;color:var(--e3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.ic-key{outline:none;transition:var(--ease);padding:1px 4px;border-radius:4px}body.editing .ic-key{background:rgba(254,243,205,.5);border:1px dashed var(--g3);cursor:text}body.editing .ic-key:focus{background:#fff;border-color:var(--e4);border-style:solid}.ic .iv{font-size:15px;font-weight:600;color:var(--n1)}
.fl{font-family:'Prompt',sans-serif;font-size:10px;font-weight:500;color:var(--e3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:flex;align-items:center;gap:6px}.rb{margin-top:16px;padding:16px 20px;background:linear-gradient(135deg,var(--g6),rgba(254,243,205,.5));border-left:3px solid var(--g3);border-radius:0 var(--rs) var(--rs) 0}.rb .fl{color:var(--g2)}
.cli{padding:14px 0;border-bottom:1px solid var(--n7)}.cli:last-child{border-bottom:none}.clh{display:flex;align-items:flex-start;gap:12px;margin-bottom:4px}.cln{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,var(--e1),var(--e3));color:#fff;font-family:'Prompt',sans-serif;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 3px 10px rgba(12,59,46,.15)}.clt{font-family:'Prompt',sans-serif;font-size:15px;font-weight:500;color:var(--e1);padding-top:4px}.cld{padding-left:44px;font-size:14px;color:var(--n3);font-weight:300}
.bk-header{padding:28px;background:linear-gradient(135deg,var(--g6),rgba(254,243,205,.3));border-left:4px solid var(--g3);border-radius:var(--r);margin-bottom:28px;position:relative;overflow:hidden}.bk-header::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(212,168,67,.08),transparent 70%);border-radius:50%}.bk-header h3{font-family:'Prompt',sans-serif;font-size:18px;font-weight:600;color:var(--g1);margin-bottom:6px;position:relative}.bk-header p{font-size:15px;color:var(--n2);font-weight:300;position:relative}
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:14px}.img-slot{position:relative;border-radius:var(--rs);overflow:hidden;background:var(--n8);border:2px dashed var(--n6);aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;transition:var(--ease)}.img-slot:hover{border-color:var(--e4)}.img-slot.has-img{border-style:solid;border-color:transparent;box-shadow:var(--shadow-sm)}.img-slot.has-img:hover{box-shadow:var(--shadow-md);transform:scale(1.02)}.img-slot img{width:100%;height:100%;object-fit:cover;transition:var(--ease)}.img-ph{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--n5);font-size:12px;font-weight:300;padding:16px;text-align:center}.img-ph svg{width:36px;height:36px;stroke:var(--n6);stroke-width:1.5;fill:none}
.img-x{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:rgba(231,76,60,.9);color:#fff;border:2px solid #fff;cursor:pointer;font-size:14px;display:none;align-items:center;justify-content:center;transition:var(--ease);box-shadow:0 3px 12px rgba(0,0,0,.3);z-index:5}.img-x:hover{transform:scale(1.2)}body.editing .has-img .img-x{display:flex}
.img-slot-upload{border:2px dashed var(--e4);background:var(--e8);cursor:pointer!important}.img-slot-upload:hover{background:var(--e7);border-color:var(--e2);transform:scale(1.02)}.img-slot.dragover{border-color:var(--e4)!important;border-style:solid!important;background:var(--e7)!important;box-shadow:var(--shadow-glow)}
.add-block-area{display:none;margin:24px 0;text-align:center}body.editing .add-block-area{display:block}.add-block-btn{padding:16px 36px;border:2px dashed var(--e4);border-radius:var(--r);background:var(--e8);color:var(--e2);font-family:'Prompt',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:var(--ease)}.add-block-btn:hover{background:var(--e7);border-color:var(--e1);transform:translateY(-3px);box-shadow:var(--shadow-md)}.add-inline{display:none;margin-top:10px}body.editing .add-inline{display:block}.add-inline-btn{padding:8px 18px;border:1.5px dashed var(--e4);border-radius:var(--rx);background:transparent;color:var(--e3);font-family:'Prompt',sans-serif;font-size:12px;cursor:pointer;transition:var(--ease)}.add-inline-btn:hover{background:var(--e8)}
.lbox{display:none;position:fixed;inset:0;z-index:3000;background:rgba(12,59,46,.95);align-items:center;justify-content:center;cursor:zoom-out;backdrop-filter:blur(8px);flex-direction:column;gap:16px}.lbox.show{display:flex}.lbox img{max-width:94%;max-height:85vh;border-radius:16px;box-shadow:0 0 80px rgba(0,0,0,.4);animation:scaleIn .3s ease;object-fit:contain}.lbox-close{position:absolute;top:24px;right:24px;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--ease);backdrop-filter:blur(8px)}.lbox-close:hover{background:rgba(255,255,255,.2);transform:scale(1.1)}.lbox-info{color:rgba(255,255,255,.5);font-size:13px;font-family:'Prompt',sans-serif}
.sig-block{text-align:center;padding:24px}.sig-area{display:inline-block;min-width:280px;min-height:100px;position:relative;margin-bottom:0;padding:10px}.sig-area img{max-height:120px;max-width:100%}.sig-placeholder{color:var(--n5);font-size:13px;padding:30px 20px;cursor:pointer;transition:var(--ease);border-radius:var(--rs)}.sig-placeholder:hover{background:var(--e8);color:var(--e2)}.sig-line{width:260px;margin:0 auto 8px;border-bottom:2px dotted var(--n5)}.sig-name{font-family:'Prompt',sans-serif;font-size:15px;font-weight:500;color:var(--n1);margin-top:4px}.sig-position{font-size:13px;color:var(--n4)}.sig-date{font-size:12px;color:var(--n5);margin-top:2px}

<script>
// ═══ GET TEACHER ID FROM URL ═══
const urlParams = new URLSearchParams(window.location.search);
const TEACHER_ID = (urlParams.get('id') || '').trim();
const REPORT_TYPE = (urlParams.get('type') || '').trim();
if (!REPORT_TYPE) {
  document.body.innerHTML = '<div style="text-align:center;padding:100px 20px"><h2 style="font-family:Prompt,sans-serif;color:#e74c3c">ไม่พบประเภทรายงาน</h2><p style="color:#6b7280;margin:16px 0">กรุณาระบุ ?type=t-report</p><a href="index.html" style="color:#22a06b;font-family:Prompt,sans-serif">← กลับหน้าหลัก</a></div>';
  throw new Error('No report_type');
}
if (!TEACHER_ID) {
  document.body.innerHTML = '<div style="text-align:center;padding:100px 20px"><h2 style="font-family:Prompt,sans-serif;color:#e74c3c">ไม่พบ Teacher ID</h2><p style="color:#6b7280;margin:16px 0">กรุณาระบุ ?type=' + encodeURIComponent(REPORT_TYPE) + '&id=xxx</p><a href="hub.html?type=' + encodeURIComponent(REPORT_TYPE) + '" style="color:#22a06b;font-family:Prompt,sans-serif">← กลับหน้ารายชื่อครู</a></div>';
  throw new Error('No teacher_id');
}

let D={},IMGS={},activeTab='',imgTarget=null,isHiddenView=false,teacherPassword='';
const API='https://script.google.com/macros/s/AKfycbzWU3DzJHBsMXXAtYU4E2wY_23iPXd2EdVBEZ6KTn2hjZYATQYXQywJDuKXeiIUcO_kjQ/exec';

// ═══ ICON PICKER ═══
const ICONS=['📄','📝','📋','📊','📚','📐','🔬','🧪','🎓','✅','⭐','🏫','👤','🤝','🛡️','📌','🖼️','📁','💡','🔑','📅','🏆','❤️','🌐','✍️'];

function buildIconPicker(containerId, defaultIcon){
  const c=document.getElementById(containerId);if(!c)return;
  c.innerHTML=ICONS.map(ic=>'<button type="button" class="ip-btn'+(ic===(defaultIcon||ICONS[0])?' active':'')+'" data-icon="'+ic+'" onclick="pickIcon(this)">'+ic+'</button>').join('');
}
function pickIcon(btn){
  btn.parentElement.querySelectorAll('.ip-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function getPickedIcon(containerId, fallback){
  const active=document.querySelector('#'+containerId+' .ip-btn.active');
  return active?active.dataset.icon:(fallback||'📄');
}

function imgUrl(id){return IMGS[id]?IMGS[id].url:''}

async function loadFromSheet(){
  try{
    showLoading('กำลังโหลดข้อมูล...');
    const r=await fetch(API+'?action=get_data&report_type='+encodeURIComponent(REPORT_TYPE)+'&teacher_id='+encodeURIComponent(TEACHER_ID),{redirect:'follow'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    if(j.status==='ok'){
      D={};
      for(const[k,v]of Object.entries(j.data||{}))D[k]=(typeof v==='string')?JSON.parse(v):v;
      IMGS=j.images||{};
      // อัปเดต title
      document.title=(j.teacher?.name||TEACHER_ID)+' — รายงานผลการปฏิบัติงาน';
      activeTab='';render()
    }else showError(j.message||'โหลดไม่ได้')
  }catch(e){showError(e.message)}
}

async function saveToSheet(){
  collect();
  const sv=document.getElementById('btnSave');
  if(sv){sv.classList.add('loading');sv.disabled=true}
  try{
    const r=await fetch(API,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'save_all',report_type:REPORT_TYPE,teacher_id:TEACHER_ID,password:teacherPassword,data:D})});
    const j=await r.json();
    toast(j.status==='ok'?'💾 บันทึกเรียบร้อย':'❌ '+j.message)
  }catch(e){toast('❌ '+e.message)}
  finally{if(sv){sv.classList.remove('loading');sv.disabled=false}}
}

async function uploadImage(b64,bid){
  const id='img_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  const r=await fetch(API,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'upload_image',report_type:REPORT_TYPE,base64:b64,fileName:id+'.jpg',image_id:id,block_id:bid,teacher_id:TEACHER_ID,password:teacherPassword})});
  const j=await r.json();
  if(j.status==='ok'){IMGS[j.image_id]={id:j.image_id,url:j.url};return j.image_id}
  throw new Error(j.message||'Upload failed')
}

async function deleteImage(id){
  fetch(API,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'delete_image',report_type:REPORT_TYPE,image_id:id,teacher_id:TEACHER_ID,password:teacherPassword})}).catch(()=>{});
  delete IMGS[id]
}

function showError(m){document.getElementById('mainContent').innerHTML=`<div style="max-width:480px;margin:60px auto;text-align:center;padding:20px"><div style="font-size:56px;margin-bottom:20px">⚠️</div><h2 style="font-family:'Prompt',sans-serif;color:var(--red);font-size:20px;margin-bottom:10px">โหลดข้อมูลไม่สำเร็จ</h2><p style="color:var(--n4);font-size:14px;margin-bottom:24px">${esc(m)}</p><button onclick="loadFromSheet()" style="padding:14px 36px;background:linear-gradient(135deg,var(--e1),var(--e3));color:#fff;border:none;border-radius:var(--rs);font-family:'Prompt',sans-serif;font-size:15px;cursor:pointer">ลองใหม่</button></div>`}
function showLoading(m){document.getElementById('mainContent').innerHTML=`<div style="text-align:center;padding:80px 20px"><div style="width:44px;height:44px;border:3px solid var(--n7);border-top-color:var(--e4);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px"></div><p style="color:var(--n4);font-family:'Prompt',sans-serif">${esc(m)}</p></div>`;document.getElementById('navBar').innerHTML=''}

// ═══ FILE UPLOAD ═══
document.getElementById('fileInput').addEventListener('change',function(e){const files=Array.from(e.target.files);if(!files.length||!imgTarget)return;let done=0;const total=files.length;toast('📤 อัปโหลด '+total+' รูป...');files.forEach(file=>{const reader=new FileReader();reader.onload=function(ev){const img=new Image();img.onload=function(){const c=document.createElement('canvas');const M=1024;let w=img.width,h=img.height;if(w>M){h=h*(M/w);w=M}if(h>M){w=w*(M/h);h=M}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);uploadImage(c.toDataURL('image/jpeg',.75),imgTarget.blockId).then(id=>{imgTarget.cb(id);done++;if(done===total){imgTarget=null;saveToSheet();render();enableEdit();toast('📷 อัปโหลด '+total+' รูปแล้ว')}}).catch(er=>{toast('❌ '+er.message);done++;if(done===total)imgTarget=null})};img.src=ev.target.result};reader.readAsDataURL(file)});e.target.value=''});

function secKeys(){return Object.keys(D).filter(k=>k.startsWith('sec_')).sort((a,b)=>parseInt(a.split('_')[1])-parseInt(b.split('_')[1]))}
document.addEventListener('DOMContentLoaded',()=>loadFromSheet());
window.addEventListener('resize',checkNavArrows);

function render(){renderHero();renderNav();renderSections();if(activeTab&&document.getElementById('tab-'+activeTab))switchTab(activeTab);else{const k=secKeys();if(k.length)switchTab(k[0])};initReveal();setTimeout(checkNavArrows,100)}

function renderHero(){const s=D.settings||{};document.getElementById('heroTitle').textContent=s.title||'รายงานผลการปฏิบัติงาน';document.getElementById('heroSub').textContent=s.subtitle||'';let name='';try{const sec1=D[secKeys()[0]];if(sec1&&sec1.blocks)sec1.blocks.forEach(b=>{if(b.type==='info-grid'&&b.data){if(b.data['ชื่อ-สกุล'])name=b.data['ชื่อ-สกุล']}})}catch(e){}document.getElementById('heroName').textContent=name;let c='';if(s.position)c+=`<div class="ch">👤 ${esc(s.position)}</div>`;if(s.period)c+=`<div class="ch">📅 ${esc(s.period)}</div>`;if(s.school)c+=`<div class="ch">🏫 ${esc(s.school)}</div>`;document.getElementById('heroChips').innerHTML=c}

function renderNav(){const keys=secKeys();let h='';const ed=document.body.classList.contains('editing');keys.forEach((k,i)=>{const sec=D[k],cls=k===activeTab?' active':'';let arr='';if(ed)arr=`<div class="tab-arrows">${i>0?`<button class="tab-arr" onclick="event.stopPropagation();moveTab('${k}',-1)">◀</button>`:''}<button class="tab-arr" onclick="event.stopPropagation();moveTab('${k}',1)">▶</button><button class="tab-arr tab-del" onclick="event.stopPropagation();delTab('${k}')">✕</button></div>`;h+=`<button class="nt${cls}" onclick="switchTab('${k}')">${sec.icon||'📄'} ${esc(sec.tab||k)}${arr}</button>`});document.getElementById('navBar').innerHTML=h}

function renderSections(){const keys=secKeys();let h='';const ed=document.body.classList.contains('editing');keys.forEach(k=>{const sec=D[k],cls=k===activeTab?' active':'';h+=`<div class="tp${cls}" id="tab-${k}"><div class="stt reveal"><div class="sti">${sec.icon||'📄'}</div><div><h2 class="sec-tab" ${ed?'contenteditable="true"':''} data-sk="${k}" data-f="tab">${esc(sec.tab||'')}</h2><p class="sec-head" ${ed?'contenteditable="true"':''} data-sk="${k}" data-f="heading" ${ed?'style="min-height:1.2em;border:1px dashed var(--g3);border-radius:4px;padding:2px 6px;background:rgba(254,243,205,.4)"':''}>${esc(sec.heading||'')}</p></div></div>`;if(sec.blocks)sec.blocks.forEach((b,i)=>{h+=renderBlock(k,b,i)});h+=`<div class="add-block-area"><button class="add-block-btn" onclick="openAddBlock('${k}')">➕ เพิ่ม Block ใหม่</button></div></div>`});document.getElementById('mainContent').innerHTML=h}

function renderBlock(sk,b,idx){const t=b.type||'text-only',ed=document.body.classList.contains('editing');const eb=`<div class="cba">${idx>0?`<button onclick="moveBlock('${sk}',${idx},-1)">▲</button>`:''}<button onclick="moveBlock('${sk}',${idx},1)">▼</button><button class="del-btn" onclick="delBlock('${sk}',${idx})">✕</button></div>`;if(t==='header')return`<div class="bk-header reveal"><h3 class="ed" data-s="${sk}" data-i="${idx}" data-f="title" data-ph="หัวข้อ...">${esc(b.title||'')}</h3><p class="ed" data-s="${sk}" data-i="${idx}" data-f="content" data-ph="เนื้อหา...">${esc(b.content||'')}</p>${eb}</div>`;let inner='';if(t==='info-grid'){inner='<div class="ig">';Object.entries(b.data||{}).forEach(([k,v])=>{inner+=`<div class="ic"><div class="fl" style="display:flex;align-items:center;gap:4px"><span class="ic-key" contenteditable="false" data-s="${sk}" data-i="${idx}" data-old="${esc(k)}">${esc(k)}</span>${ed?`<button onclick="delInfoField('${sk}',${idx},'${esc(k).replace(/'/g,"\\'")}')" style="width:16px;height:16px;border:none;background:none;color:var(--red);cursor:pointer;font-size:12px;padding:0;display:inline-flex;align-items:center;justify-content:center" title="ลบช่อง">✕</button>`:''}</div><div class="iv ed" data-s="${sk}" data-i="${idx}" data-f="data.${k}" data-ph="...">${esc(v)}</div></div>`});inner+='</div><div class="add-inline"><button class="add-inline-btn" onclick="addInfoField(\''+sk+'\','+idx+')">+ เพิ่มช่อง</button></div>'}if(t==='text-only'||t==='text-images'){inner+=`<div class="fl">📝 เนื้อหา</div><div class="ed" data-s="${sk}" data-i="${idx}" data-f="content" data-ph="เนื้อหา...">${esc(b.content||'')}</div><div class="rb"><div class="fl">⭐ ผลลัพธ์</div><div class="ed" data-s="${sk}" data-i="${idx}" data-f="sub" data-ph="ผลลัพธ์...">${esc(b.sub||'')}</div></div>`}if(t==='text-images'||t==='images-only'){const ids=(b.images||[]).filter(id=>id&&imgUrl(id));if(ids.length||ed){if(ed)inner+='<div class="fl" style="margin-top:16px">🖼️ ภาพประกอบ</div>';inner+='<div class="img-grid">';ids.forEach((id,ii)=>{const url=imgUrl(id);if(url)inner+=`<div class="img-slot has-img"><img src="${esc(url)}" onclick="openLB('${sk}',${idx},${ii})" loading="lazy"><button class="img-x" onclick="event.stopPropagation();delImg('${sk}',${idx},${ii})">✕</button></div>`});if(ed)inner+=`<div class="img-slot img-slot-upload" onclick="triggerUpload('${sk}',${idx})" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="handleDrop(event,'${sk}',${idx})"><div class="img-ph"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>คลิกหรือลากรูปมาวาง</div></div>`;inner+='</div>'}}if(t==='signature'){const hasSig=b.sig_data;inner+='<div class="sig-block"><div class="sig-area">';if(hasSig){inner+=`<img src="${esc(b.sig_data)}" style="cursor:pointer" onclick="clearSigData('${sk}',${idx})" title="คลิกเพื่อล้างลายเซ็น">`}else{inner+=`<div class="sig-placeholder" onclick="openSigModal('${sk}',${idx})">✍️ คลิกเพื่อลงนาม</div>`}inner+='</div><div class="sig-line"></div>';inner+=`<div class="sig-name ed" data-s="${sk}" data-i="${idx}" data-f="sig_name" data-ph="( ชื่อผู้ลงนาม )">${esc(b.sig_name||'')}</div>`;inner+=`<div class="sig-position ed" data-s="${sk}" data-i="${idx}" data-f="sig_pos" data-ph="ตำแหน่ง">${esc(b.sig_pos||'')}</div>`;if(b.sig_date)inner+=`<div class="sig-date">วันที่ ${esc(b.sig_date)}</div>`;inner+='</div>'}if(t==='checklist'){(b.items||[]).forEach((it,ii)=>{inner+=`<div class="cli"><div class="clh"><div class="cln">${ii+1}</div><div class="clt ed" data-s="${sk}" data-i="${idx}" data-f="items.${ii}.label" data-ph="หัวข้อ...">${esc(it.label||'')}</div></div><div class="cld ed" data-s="${sk}" data-i="${idx}" data-f="items.${ii}.desc" data-ph="รายละเอียด...">${esc(it.desc||'')}</div></div>`});inner+=`<div class="add-inline"><button class="add-inline-btn" onclick="addCheckItem('${sk}',${idx})">+ เพิ่มรายการ</button></div>`}return`<div class="card reveal"><div class="ct"><div class="cn">${tIcon(t,b)}</div><h3 class="ed" data-s="${sk}" data-i="${idx}" data-f="title" data-ph="หัวข้อ...">${esc(b.title||'')}</h3>${eb}</div><div class="cbody">${inner}</div></div>`}
function tIcon(t,b){if(b&&b.icon)return b.icon;return{'text-only':'📝','text-images':'🖼️','images-only':'🖼️','info-grid':'📊','header':'📌','checklist':'✅','signature':'✍️'}[t]||'📄'}

function initReveal(){const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target)}})},{threshold:.1,rootMargin:'0px 0px -40px 0px'});document.querySelectorAll('.reveal').forEach(el=>obs.observe(el))}

function triggerUpload(sk,bi){if(!document.body.classList.contains('editing'))return;collect();const bid=D[sk].blocks[bi].id||'';imgTarget={blockId:bid,cb:id=>{if(!D[sk].blocks[bi].images)D[sk].blocks[bi].images=[];D[sk].blocks[bi].images.push(id)}};document.getElementById('fileInput').click()}
function handleDrop(e,sk,bi){e.preventDefault();e.currentTarget.classList.remove('dragover');if(!document.body.classList.contains('editing'))return;const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));if(!files.length)return;collect();const bid=D[sk].blocks[bi].id||'';let done=0;toast('📤 อัปโหลด...');files.forEach(file=>{const reader=new FileReader();reader.onload=ev=>{const img=new Image();img.onload=function(){const c=document.createElement('canvas');const M=1024;let w=img.width,h=img.height;if(w>M){h=h*(M/w);w=M}if(h>M){w=w*(M/h);h=M}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);if(!D[sk].blocks[bi].images)D[sk].blocks[bi].images=[];uploadImage(c.toDataURL('image/jpeg',.75),bid).then(id=>{D[sk].blocks[bi].images.push(id);done++;if(done===files.length){saveToSheet();render();enableEdit();toast('📷 เพิ่ม '+files.length+' รูป')}}).catch(()=>{done++;if(done===files.length)toast('❌ อัปโหลดไม่สำเร็จ')})};img.src=ev.target.result};reader.readAsDataURL(file)})}
function delImg(sk,bi,ii){if(!confirm('ลบรูปนี้?'))return;collect();const id=D[sk].blocks[bi].images[ii];D[sk].blocks[bi].images.splice(ii,1);deleteImage(id);saveToSheet();render();enableEdit()}
function openLB(sk,bi,ii){const ids=D[sk]?.blocks?.[bi]?.images||[];const url=imgUrl(ids[ii]);if(!url)return;document.getElementById('lboxImg').src=url;document.getElementById('lboxInfo').textContent='รูปที่ '+(ii+1)+' / '+ids.length;document.getElementById('lbox').classList.add('show')}
function closeLB(e){if(e.target===e.currentTarget||e.target.tagName!=='IMG')document.getElementById('lbox').classList.remove('show')}
function switchTab(k){if(document.body.classList.contains('editing'))collect();activeTab=k;renderNav();renderSections();const t=document.getElementById('tab-'+k);if(t)t.classList.add('active');if(document.body.classList.contains('editing'))enableEdit();initReveal()}
function moveTab(k,dir){collect();const keys=secKeys(),idx=keys.indexOf(k),ni=idx+dir;if(ni<0||ni>=keys.length)return;const nA=parseInt(keys[idx].split('_')[1]),nB=parseInt(keys[ni].split('_')[1]);const a=D[keys[idx]],b=D[keys[ni]];D['sec_'+nA]=b;D['sec_'+nB]=a;activeTab='sec_'+nB;saveToSheet();render();enableEdit()}
function delTab(k){if(!confirm('ลบ Tab?'))return;collect();delete D[k];activeTab=secKeys()[0]||'';saveToSheet();render();if(document.body.classList.contains('editing'))enableEdit()}

function collect(){document.querySelectorAll('.ed[data-s]').forEach(el=>{const sk=el.dataset.s,bi=parseInt(el.dataset.i),f=el.dataset.f,v=el.textContent.trim();if(!D[sk]?.blocks?.[bi])return;const b=D[sk].blocks[bi];if(f.startsWith('data.')){if(!b.data)b.data={};b.data[f.slice(5)]=v}else if(f.startsWith('items.')){const p=f.split('.');if(b.items?.[parseInt(p[1])])b.items[parseInt(p[1])][p[2]]=v}else b[f]=v});document.querySelectorAll('.ic-key[data-s]').forEach(el=>{const sk=el.dataset.s,bi=parseInt(el.dataset.i),oldKey=el.dataset.old,newKey=el.textContent.trim();if(!D[sk]?.blocks?.[bi]||!newKey||newKey===oldKey)return;const d=D[sk].blocks[bi].data;if(d&&d.hasOwnProperty(oldKey)){d[newKey]=d[oldKey];delete d[oldKey]}});document.querySelectorAll('.sec-tab[data-sk]').forEach(el=>{const sk=el.dataset.sk;if(D[sk])D[sk].tab=el.textContent.trim()});document.querySelectorAll('.sec-head[data-sk]').forEach(el=>{const sk=el.dataset.sk;if(D[sk])D[sk].heading=el.textContent.trim()})}

function delInfoField(sk,bi,key){if(!confirm('ลบช่อง "'+key+'"?'))return;collect();const d=D[sk].blocks[bi].data;if(d)delete d[key];saveToSheet();render();enableEdit()}

async function loadPrivateData(pw){
  try{
    showLoading('กำลังโหลดข้อมูล (โหมดแก้ไข)...');
    const r=await fetch(API,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'get_private_data',report_type:REPORT_TYPE,teacher_id:TEACHER_ID,password:pw})});
    const j=await r.json();
    if(j.status==='ok'){
      D={};
      for(const[k,v]of Object.entries(j.data||{}))D[k]=(typeof v==='string')?JSON.parse(v):v;
      IMGS=j.images||{};
      document.title=(j.teacher?.name||TEACHER_ID)+' — รายงานผลการปฏิบัติงาน';
      activeTab='';render()
    }else showError(j.message||'โหลดไม่ได้')
  }catch(e){showError(e.message)}
}

// ═══ PASSWORD CHECK — ใช้ API verify ═══
async function chkPw(){
  const btn=document.getElementById('btnChkPw');
  btn.classList.add('loading');btn.disabled=true;
  const pw=document.getElementById('iPw').value;
  try{
    const r=await fetch(API,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'verify_teacher',report_type:REPORT_TYPE,teacher_id:TEACHER_ID,password:pw})});
    const j=await r.json();
    if(j.status==='ok'){
      teacherPassword=pw;
      await loadPrivateData(pw);
      cl('mPw');document.body.classList.add('editing');enableEdit();toast('🔓 เข้าสู่โหมดแก้ไข')
    }else{
      document.getElementById('ePw').textContent='รหัสผ่านไม่ถูกต้อง';document.getElementById('iPw').value=''}
  }catch(e){document.getElementById('ePw').textContent=e.message}
  finally{btn.classList.remove('loading');btn.disabled=false}
}

function enableEdit(){document.querySelectorAll('.ed').forEach(el=>el.contentEditable='true');document.querySelectorAll('.ic-key').forEach(el=>el.contentEditable='true')}
function exitEdit(){collect();saveToSheet();teacherPassword='';document.body.classList.remove('editing');render()}

// ═══ BEFOREUNLOAD WARNING ═══
window.addEventListener('beforeunload',function(e){if(document.body.classList.contains('editing')){e.preventDefault();e.returnValue='คุณมีข้อมูลที่ยังไม่ได้บันทึก ต้องการออกหรือไม่?'}});
function moveBlock(sk,i,dir){collect();const bl=D[sk].blocks,ni=i+dir;if(ni<0||ni>=bl.length)return;[bl[i],bl[ni]]=[bl[ni],bl[i]];saveToSheet();render();enableEdit()}
function delBlock(sk,i){if(!confirm('ลบ?'))return;collect();D[sk].blocks.splice(i,1);saveToSheet();render();enableEdit()}

let addBlockTarget='';
function openAddBlock(sk){addBlockTarget=sk;document.getElementById('abTitle').value='';buildIconPicker('abIconPicker','📝');op('mAb')}
function confirmAddBlock(){const type=document.getElementById('abType').value,title=document.getElementById('abTitle').value.trim()||'หัวข้อใหม่',icon=getPickedIcon('abIconPicker');collect();if(!D[addBlockTarget].blocks)D[addBlockTarget].blocks=[];const nb={id:'b'+Date.now(),type,title,icon};if(type==='text-only'||type==='text-images'){nb.content='';nb.sub=''}if(type==='text-images'||type==='images-only')nb.images=[];if(type==='info-grid')nb.data={'หัวข้อ':''};if(type==='checklist')nb.items=[{label:'',desc:''}];if(type==='header')nb.content='';if(type==='signature'){nb.content=title;nb.sig_pin=document.getElementById('abPin').value||'0000';nb.sig_data='';nb.sig_name='';nb.sig_pos='';nb.sig_date=''}D[addBlockTarget].blocks.push(nb);cl('mAb');document.getElementById('abSigPin').style.display='none';saveToSheet();render();enableEdit()}
function addInfoField(sk,bi){const n=prompt('ชื่อช่อง:');if(!n)return;collect();if(!D[sk].blocks[bi].data)D[sk].blocks[bi].data={};D[sk].blocks[bi].data[n]='';saveToSheet();render();enableEdit()}
function addCheckItem(sk,bi){collect();D[sk].blocks[bi].items.push({label:'',desc:''});saveToSheet();render();enableEdit()}
function confirmAddSection(){const tab=document.getElementById('asTab').value.trim()||'หน้าใหม่',icon=getPickedIcon('asIconPicker','📄'),heading=document.getElementById('asHead').value.trim();collect();const mx=secKeys().reduce((m,k)=>Math.max(m,parseInt(k.split('_')[1])||0),0);D['sec_'+(mx+1)]={tab,icon,heading,blocks:[]};cl('mAs');activeTab='sec_'+(mx+1);saveToSheet();render();enableEdit();toast('📂 เพิ่ม "'+tab+'"')}
function openAddTab(){document.getElementById('asTab').value='';document.getElementById('asHead').value='';buildIconPicker('asIconPicker','📄');op('mAs')}

function openSettings(){const s=D.settings||{};document.getElementById('sTitle').value=s.title||'';document.getElementById('sSub').value=s.subtitle||'';document.getElementById('sSchool').value=s.school||'';document.getElementById('sPos').value=s.position||'';document.getElementById('sPeriod').value=s.period||'';document.getElementById('sNewPw').value='';op('mSt')}
function saveSettings(){if(!D.settings)D.settings={};D.settings.title=document.getElementById('sTitle').value;D.settings.subtitle=document.getElementById('sSub').value;D.settings.school=document.getElementById('sSchool').value;D.settings.position=document.getElementById('sPos').value;D.settings.period=document.getElementById('sPeriod').value;const np=document.getElementById('sNewPw').value;if(np){D.settings.password=np;fetch(API,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'change_password',report_type:REPORT_TYPE,teacher_id:TEACHER_ID,old_password:teacherPassword,new_password:np})}).then(r=>r.json()).then(j=>{if(j.status==='ok')teacherPassword=np}).catch(()=>{})}cl('mSt');saveToSheet();renderHero();toast('⚙️ บันทึกแล้ว')}

// ═══ SIGNATURE ═══
let sigTarget=null,sigCtx=null,sigDrawing=false;
function openSigModal(sk,bi){sigTarget={sk,bi};const b=D[sk].blocks[bi];document.getElementById('sigTitle').textContent=b.title||b.content||'ลงนาม';document.getElementById('sigPin').value='';document.getElementById('sigErr').textContent='';document.getElementById('sigCanvas').style.display='none';document.getElementById('sigBtnPre').style.display='flex';op('mSig');setTimeout(()=>document.getElementById('sigPin').focus(),200)}
function verifySigPin(){const b=D[sigTarget.sk].blocks[sigTarget.bi];const pin=document.getElementById('sigPin').value;if(pin!==b.sig_pin){document.getElementById('sigErr').textContent='❌ รหัส PIN ไม่ถูกต้อง';document.getElementById('sigPin').value='';return}document.getElementById('sigErr').textContent='';document.getElementById('sigCanvas').style.display='block';document.getElementById('sigBtnPre').style.display='none';initSigCanvas()}
function initSigCanvas(){const cv=document.getElementById('sigPad');const rect=cv.parentElement.getBoundingClientRect();cv.width=Math.floor(rect.width);cv.height=200;sigCtx=cv.getContext('2d');sigCtx.lineWidth=2.5;sigCtx.lineCap='round';sigCtx.lineJoin='round';sigCtx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--e1').trim()||'#0c3b2e';sigDrawing=false;cv.onpointerdown=e=>{sigDrawing=true;sigCtx.beginPath();const r=cv.getBoundingClientRect();sigCtx.moveTo(e.clientX-r.left,e.clientY-r.top)};cv.onpointermove=e=>{if(!sigDrawing)return;const r=cv.getBoundingClientRect();sigCtx.lineTo(e.clientX-r.left,e.clientY-r.top);sigCtx.stroke()};cv.onpointerup=()=>sigDrawing=false;cv.onpointerleave=()=>sigDrawing=false;cv.setPointerCapture&&cv.addEventListener('gotpointercapture',e=>e.target.releasePointerCapture(e.pointerId))}
function clearSig(){const cv=document.getElementById('sigPad');sigCtx.clearRect(0,0,cv.width,cv.height)}
async function saveSig(){const cv=document.getElementById('sigPad');const data=cv.toDataURL('image/png');const b=D[sigTarget.sk].blocks[sigTarget.bi];cl('mSig');toast('📤 กำลังบันทึกลายเซ็น...');try{const id='sig_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);const r=await fetch(API,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'upload_image',report_type:REPORT_TYPE,base64:data,fileName:id+'.png',image_id:id,block_id:b.id||'',teacher_id:TEACHER_ID,password:teacherPassword})});const j=await r.json();if(j.status==='ok'){b.sig_data=j.url;b.sig_image_id=j.image_id}else{b.sig_data=data}}catch(e){b.sig_data=data}b.sig_date=new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'});saveToSheet();render();if(document.body.classList.contains('editing'))enableEdit();toast('✍️ ลงนามเรียบร้อย')}
function clearSigData(sk,bi){const b=D[sk].blocks[bi];const pin=prompt('🔑 ใส่รหัส PIN เพื่อล้างลายเซ็น:');if(!pin)return;if(pin!==b.sig_pin){toast('❌ รหัส PIN ไม่ถูกต้อง');return}collect();if(b.sig_image_id)deleteImage(b.sig_image_id);b.sig_data='';b.sig_date='';b.sig_image_id='';saveToSheet();render();if(document.body.classList.contains('editing'))enableEdit();toast('🗑️ ล้างลายเซ็นแล้ว')}

// ═══ NAV ═══
function scrollNav(dx){document.getElementById('navBar').scrollBy({left:dx,behavior:'smooth'})}
function checkNavArrows(){const nb=document.getElementById('navBar');const l=document.getElementById('navL');const r=document.getElementById('navR');if(!nb||!l||!r)return;l.style.display=nb.scrollLeft>4?'flex':'none';r.style.display=nb.scrollLeft<nb.scrollWidth-nb.clientWidth-4?'flex':'none'}

// ═══ UTILS ═══
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800)}
function op(id){document.getElementById(id).classList.add('show');if(id==='mPw'){document.getElementById('iPw').value='';document.getElementById('ePw').textContent='';setTimeout(()=>document.getElementById('iPw').focus(),200)}}
function cl(id){document.getElementById(id).classList.remove('show')}
</script>
